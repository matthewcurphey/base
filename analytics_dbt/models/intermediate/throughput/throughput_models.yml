version: 2

models:

  # -------------------------------------------------------------------
  # Castle throughput
  # -------------------------------------------------------------------

  - name: int_castle__throughput_production
    description: >
      Castle operations throughput at DJ grain. Joins prodorder, actualusage,
      expectedusage, and route attribution. Outputs picked/complete/engineered
      lbs and USD, plus operation_codes and operation_names lists for the DJ.
      Filter-aligned with yield_final: Complete/Closed, picked_lbs > 0,
      complete_lbs != -99999, 2024-01-01 to current_date. Includes SO
      linkage and 445 calendar. Includes Goodrich Rohr (unlike yield_final).

  - name: int_castle__throughput_shipped
    description: >
      Castle shipped throughput at SO line / shipment grain. Filtered to
      sales_type in ('Invoice', 'Shipped') and weight_lbs > 0. Outputs
      weight_lbs (shipped_lbs) and gross_weight_lbs (shipped_gross_lbs).
      Period assigned via actual_ship_date, filtered 2024-01-01 to current_date.
      product_source_type carries
      processing classification (PPS, production, direct).
